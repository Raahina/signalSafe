<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeSignal AI - SOC Dashboard</title>

<style>

/* ===============================
   COLOR THEME VARIABLES
   =============================== */
:root {
    --deep: #860000;
    --alert: #ff0000;
    --highlight: #DE3C62;
    --accent: #ED7BC3;
    --soft: #EBAEE9;
    --panel: rgba(255,255,255,0.06);
}

/* ===============================
   GLOBAL PAGE STYLING
   =============================== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #860000, #C40002);
    color: white;
}

/* ===============================
   HEADER SECTION
   =============================== */
header {
    padding: 20px 30px;
    background: rgba(0,0,0,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* ===============================
   MAIN DASHBOARD LAYOUT
   =============================== */
.main {
    display: flex;
    padding: 20px;
    gap: 20px;
}

/* ===============================
   CAMERA TILE
   =============================== */
.camera-tile {
    width: 50%;
    background: var(--panel);
    border-radius: 15px;
    padding: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px rgba(237, 123, 195, 0.3);
    position: relative;
    transition: 0.3s;
}

/* Highlight when alert is active */
.camera-tile.alert-active {
    border: 2px solid red;
    box-shadow: 0 0 40px red;
}

/* Blinking red indicator */
.camera-tile.alert-active::after {
    content: "";
    position: absolute;
    top: 12px;
    right: 12px;
    width: 14px;
    height: 14px;
    background: red;
    border-radius: 50%;
    animation: blink 1s infinite;
}

/* Blink animation */
@keyframes blink {
    0% { opacity: 1; box-shadow: 0 0 15px red; }
    50% { opacity: 0.2; }
    100% { opacity: 1; box-shadow: 0 0 15px red; }
}

video {
    width: 100%;
    border-radius: 10px;
    background: black;
}

/* ===============================
   ALERT PANEL
   =============================== */
.alert-panel {
    width: 25%;
    background: var(--panel);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(237, 123, 195, 0.5);
}

/* ===============================
   MAP VIEW PANEL
   =============================== */
.map-panel {
    width: 25%;
    background: var(--panel);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(237,123,195,0.5);
}

.floor {
    margin-bottom: 15px;
    padding: 10px;
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
}

.floor-title {
    font-weight: bold;
    margin-bottom: 8px;
}

/* Camera dot (normal state = green) */
.camera-dot {
    width: 16px;
    height: 16px;
    background: limegreen;
    border-radius: 50%;
    display: inline-block;
    margin-right: 10px;
    transition: 0.3s;
}

/* Camera dot alert state */
.camera-dot.alert {
    background: red;
    animation: pulse 1s infinite;
}

/* Red glow animation */
@keyframes pulse {
    0% { box-shadow: 0 0 5px red; }
    50% { box-shadow: 0 0 20px red; }
    100% { box-shadow: 0 0 5px red; }
}

/* ===============================
   BUTTONS
   =============================== */
button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.false-btn {
    background: var(--soft);
    color: #860000;
}

.escalate-btn {
    background: black;
    color: var(--accent);
    border: 1px solid var(--accent);
}

</style>
</head>

<body>

<header>
    <h1>SafeSignal AI - Security Operations Center</h1>
</header>

<div class="main">

    <!-- LIVE CAMERA -->
    <div class="camera-tile" id="cam1_test">
        <h3>Floor 1 - Cam 1</h3>
        <video autoplay muted playsinline></video>
    </div>

    <!-- ALERT PANEL -->
    <div class="alert-panel" id="alertPanel" style="display:none;">
        <h2>⚠ HIGH PRIORITY ALERT</h2>
        <p><strong>Location:</strong> Floor 1</p>
        <p><strong>Camera:</strong> Cam 1</p>
        <p><strong>Time:</strong> <span id="liveTime"></span></p>

        <button class="false-btn" id="falseBtn">Mark False Positive</button>
        <button class="escalate-btn" id="escalateBtn">Escalate to Campus Safety</button>
    </div>

    <!-- MAP VIEW -->
    <div class="map-panel">
        <h2>Building Layout</h2>

        <div class="floor">
            <div class="floor-title">Floor 1</div>
            <span class="camera-dot" id="dotCam1"></span> Cam 1
        </div>

        <div class="floor">
            <div class="floor-title">Floor 2</div>
        </div>

        <div class="floor">
            <div class="floor-title">Floor 3</div>
        </div>

        <div class="floor">
            <div class="floor-title">Floor 4</div>
        </div>
    </div>

</div>

<script>

/* ===============================
   SYSTEM STATE VARIABLES
   =============================== */
let alertActive = false;
let cooldown = false;

/* DOM REFERENCES */
const video = document.querySelector("video");
const camTile = document.getElementById("cam1_test");
const alertPanel = document.getElementById("alertPanel");
const dotCam1 = document.getElementById("dotCam1");

/* ===============================
   ALERT BEEP SOUND
   =============================== */
function playBeep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = ctx.createOscillator();
    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(900, ctx.currentTime);
    oscillator.connect(ctx.destination);
    oscillator.start();
    oscillator.stop(ctx.currentTime + 0.3);
}

/* ===============================
   LIVE CLOCK
   =============================== */
function updateTime() {
    document.getElementById("liveTime").textContent =
        new Date().toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();

/* ===============================
   START WEBCAM
   =============================== */
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

/* ===============================
   SIMULATED ALERT TRIGGER
   Replace with backend detection
   =============================== */
setInterval(() => {

    if (alertActive || cooldown) return;

    if (Math.random() < 0.08) {
        triggerAlert();
    }

}, 2000);

/* ===============================
   TRIGGER ALERT
   =============================== */
function triggerAlert() {
    camTile.classList.add("alert-active");
    dotCam1.classList.add("alert");
    alertPanel.style.display = "block";
    playBeep();
    alertActive = true;
}

/* ===============================
   ESCALATE BUTTON
   =============================== */
document.getElementById("escalateBtn").addEventListener("click", () => {
    if(confirm("Escalate to Campus Safety?")){
        window.location.href = "tel:1236547889";
    }
});

/* ===============================
   FALSE POSITIVE RESET
   =============================== */
document.getElementById("falseBtn").addEventListener("click", () => {

    const name = prompt("Enter your name:");
    if (!name) return;

    camTile.classList.remove("alert-active");
    dotCam1.classList.remove("alert");
    alertPanel.style.display = "none";

    alertActive = false;
    cooldown = true;

    setTimeout(() => cooldown = false, 4000);
});

</script>

</body>
</html>
